name: Update README

on:
  push:
    branches: [ "main" ]

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Count solved problems
        run: |
          total=$(find . -type d -not -path '*/\.*' | wc -l)
          total=$((total - 1)) # remove root folder
          echo "TOTAL=$total" >> $GITHUB_ENV

      - name: Update README
        run: |
          echo "# LeetCode Progress 🚀" > README.md
          echo "" >> README.md
          echo "✅ Total Problems Solved: $TOTAL" >> README.md
          echo "" >> README.md
          echo "_Auto-updated via GitHub Actions_" >> README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Auto update README" || echo "No changes"
          git push
