name: 🚀 Ultra Pro README

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allows manual triggering from GitHub UI
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11" # Pinned to a specific version for consistency
          cache: 'pip' # ⚡ Speeds up workflow by caching installed packages

      - name: Install deps
        run: pip install -r requirements.txt # ⚡ Best practice: use a requirements file

      - name: Run script
        run: python scripts/update_readme.py

      - name: Commit & Push
        uses: stefanzweifel/git-auto-commit-action@v5 # ⚡ Industry standard for auto-committing
        with:
          commit_message: "🚀 Ultra update [skip ci]"
          file_pattern: README.md
